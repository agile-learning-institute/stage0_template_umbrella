# docker-compose.yaml for {{info.name}} developers edition
{% set schema_domain = architecture.domains | selectattr('name', 'equalto', 'schema') | first %}
{% set schema_api = schema_domain.repos | selectattr('type', 'equalto', 'api') | first %}
{% set schema_spa = schema_domain.repos | selectattr('type', 'equalto', 'spa_ref') | first %}
services:
  ##################################
  # Welcome Service
  ##################################
  welcome:
    image: {{org.docker_host}}/{{org.docker_org}}/{{info.slug}}:latest
    ports:
      - "127.0.0.1:8080:80"
    profiles:
      - all
      - mongodb
{% for domain in architecture.domains %}{% if domain.name not in ['schema', 'common_code'] %}{% set api_repo = domain.repos | selectattr('type', 'equalto', 'api') | first %}{% set spa_repo = (domain.repos | selectattr('type', 'equalto', 'spa') | first) or (domain.repos | selectattr('type', 'equalto', 'spa_ref') | first) %}{% if api_repo and spa_repo %}
      - {{ domain.name }}
      - {{ domain.name }}-api
{% endif %}{% endif %}{% endfor %}

  ##################################
  # Backing Services
  ##################################
  mongodb:
    image: mongo:7.0.5
    ports:
      - "127.0.0.1:27017:27017"
    extra_hosts:
      - "mongodb:127.0.0.1"
    healthcheck:
      test: echo "db.runCommand('ping')" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      retries: 3
    command: ["--bind_ip_all", "--port", "27017"]
    profiles:
      - all
      - mongodb
{% for domain in architecture.domains %}{% if domain.name not in ['schema', 'common_code'] %}{% set api_repo = domain.repos | selectattr('type', 'equalto', 'api') | first %}{% if api_repo %}
      - {{ domain.name }}_api
{% endif %}{% endif %}{% endfor %}

  ##################################
  # Mongo Database Configuration Utilities
  ##################################
  mongodb_api:
    image: {{org.docker_host}}/{{org.docker_org}}/{{info.slug}}_mongodb_api:latest
    restart: no
    ports:
      - "127.0.0.1:{{ schema_api.port }}:{{ schema_api.port }}"
    environment:
      MONGO_CONNECTION_STRING: mongodb://mongodb:27017/
      MONGODB_REQUIRE_TLS: False
      MONGO_DB_NAME: {{info.db_name}}
      AUTO_PROCESS: True
      LOAD_TEST_DATA: True
      API_PORT: {{ schema_api.port }}
      SPA_PORT: {{ schema_spa.port }}
      UI_HEADER: "{{info.name}} Schemas"
    depends_on:
      mongodb:
        condition: service_healthy
    profiles:
      - all
      - mongodb
{% for domain in architecture.domains %}{% if domain.name not in ['schema', 'common_code'] %}{% set api_repo = domain.repos | selectattr('type', 'equalto', 'api') | first %}{% if api_repo %}
      - {{ domain.name }}_api
{% endif %}{% endif %}{% endfor %}

  mongodb_spa:
    image: ghcr.io/agile-learning-institute/mongodb_configurator_spa:latest
    restart: no
    ports:
      - "127.0.0.1:{{ schema_spa.port }}:{{ schema_spa.port }}"
    environment:
      API_HOST: mongodb_api
      API_PORT: {{ schema_api.port }}
      SPA_PORT: {{ schema_spa.port }}
    depends_on:
      mongodb_api:
        condition: service_started
    profiles:
      - all
      - mongodb
{% for domain in architecture.domains %}{% if domain.name not in ['schema', 'common_code'] %}{% set api_repo = domain.repos | selectattr('type', 'equalto', 'api') | first %}{% if api_repo %}
      - {{ domain.name }}_api
{% endif %}{% endif %}{% endfor %}

  ##################################
  # Microservice domains (from architecture)
  ##################################
{% for domain in architecture.domains %}
{% if domain.name not in ['schema', 'common_code'] %}
{% set api_repo = domain.repos | selectattr('type', 'equalto', 'api') | first %}
{% set spa_repo = (domain.repos | selectattr('type', 'equalto', 'spa') | first) or (domain.repos | selectattr('type', 'equalto', 'spa_ref') | first) %}
{% if api_repo and spa_repo %}
  {{ api_repo.name }}:
    image: {{org.docker_host}}/{{org.docker_org}}/{{info.slug}}_{{ api_repo.name }}:latest
    restart: no
    ports:
      - "127.0.0.1:{{ api_repo.port }}:{{ api_repo.port }}"
    environment:
      MONGO_CONNECTION_STRING: mongodb://mongodb:27017/
      MONGODB_REQUIRE_TLS: False
      MONGO_DB_NAME: {{info.db_name}}
      ENABLE_LOGIN: "true"
      LOGGING_LEVEL: "INFO"
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: {{ api_repo.port }}
      SAMPLE_API_PORT: {{ api_repo.port }}
      SAMPLE_SPA_PORT: {{ spa_repo.port }}
    depends_on:
      mongodb_api:
        condition: service_started
    profiles:
      - all
      - {{ domain.name }}
      - {{ domain.name }}-api

  {{ spa_repo.name }}:
    image: {{org.docker_host}}/{{org.docker_org}}/{{info.slug}}_{{ spa_repo.name }}:latest
    restart: no
    ports:
      - "127.0.0.1:{{ spa_repo.port }}:80"
    environment:
      API_HOST: {{ api_repo.name }}
      API_PORT: {{ api_repo.port }}
      IDP_LOGIN_URI: ${IDP_LOGIN_URI:-http://localhost:{{ spa_repo.port }}/login}
    depends_on:
      {{ api_repo.name }}:
        condition: service_started
    profiles:
      - all
      - {{ domain.name }}

{% endif %}
{% endif %}
{% endfor %}
