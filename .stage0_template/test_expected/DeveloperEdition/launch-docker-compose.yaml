# Run Stage0 automation from an umbrella clone (service repos + images).
# Usage from umbrella repo root (after export GITHUB_TOKEN):
#   docker compose -f DeveloperEdition/launch-docker-compose.yaml run --rm automation launch-all
# Makefile targets set STAGE0_UMBRELLA_HOST_PATH and STAGE0_LAUNCHPAD_HOST_PATH.

services:
  automation:
    image: ghcr.io/agile-learning-institute/stage0_launch:latest
    entrypoint: ["/launch.sh"]
    volumes:
      - ${STAGE0_UMBRELLA_HOST_PATH}:/workspace/umbrella:rw
      - ${STAGE0_LAUNCHPAD_HOST_PATH}:/workspace/parent:rw
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      UMBRELLA_DIR: /workspace/umbrella
      SERVICE_SOURCE_DIR: /workspace/parent
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GH_TOKEN: ${GITHUB_TOKEN}
      SERVICES: ${SERVICES:-}
      I_CONFIRM_DELETE_SERVICES: ${I_CONFIRM_DELETE_SERVICES:-}
      I_CONFIRM_DELETE_ALL: ${I_CONFIRM_DELETE_ALL:-}
      I_CONFIRM_SLUG: ${I_CONFIRM_SLUG:-}
    restart: "no"